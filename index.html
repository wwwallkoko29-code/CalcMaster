<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math AI Ultimate</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjs@11.8.0/lib/browser/math.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>Math AI Ultimate / الرياضيات الذكية</h1>
    
    <div id="chat" class="chat-box"></div>

    <input type="text" id="input" placeholder="اكتب هنا / Type here...">
    <button onclick="send()">Send / إرسال</button>
    <button onclick="clearChat()">Clear / مسح</button>

    <h2>History / التاريخ</h2>
    <div id="history" class="history-box"></div>

    <canvas id="graph"></canvas>
  </div>

  <script src="script.js"></script>
</body>
</html>
