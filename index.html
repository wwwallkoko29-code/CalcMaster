<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CalcMaster Ultimate</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.12.0/math.js"></script>
</head>
<body>
  <header>
    <h1>CalcMaster Ultimate</h1>
    <p>Enter any mathematical equation and get the solution step by step!</p>
  </header>

  <main>
    <div class="calculator">
      <textarea id="equation" placeholder="Type your equation here, e.g. 2*x+5=15"></textarea>
      <button onclick="solveEquation()">Solve</button>
      <div id="solution"></div>
    </div>
  </main>

  <footer>
    <p>© 2026 CalcMaster Ultimate | All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
